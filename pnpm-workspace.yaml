# Mantém o store antigo (o default mudou no pnpm 11) para não exigir
# reinstalação completa do node_modules.
storeDir: /home/joao/.local/share/pnpm/store
packages:
  - packages/*
  - plugins/*
  - apps/*
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  tesseract.js: true
  vue-demi: true
