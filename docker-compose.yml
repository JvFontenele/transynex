services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: transynex
      POSTGRES_PASSWORD: transynex
      POSTGRES_DB: transynex
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  # Tradutor offline. Se você já roda um LibreTranslate manualmente na porta
  # 5000, suba só os outros serviços: docker compose up -d postgres redis
  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - '5000:5000'
    volumes:
      - libretranslate-data:/home/libretranslate/.local

volumes:
  postgres-data:
  redis-data:
  libretranslate-data:
